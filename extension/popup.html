<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalFlow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      background: #0d0d14;
      color: #e4e4f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(99,102,241,0.08);
    }
    .header-left { display: flex; align-items: center; gap: 9px; }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 10px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .logo-text { font-weight: 700; font-size: 14px; color: #fff; }
    .logo-sub { font-size: 10px; color: #52526e; }
    .plan-badge {
      font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 20px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6); color: white;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .plan-badge.pro { background: linear-gradient(135deg,#f59e0b,#ef4444); }

    /* ── Profile card (logged in) ── */
    #profileSection {
      padding: 20px 18px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: none;
    }
    .avatar-row {
      display: flex; align-items: center; gap: 13px; margin-bottom: 14px;
    }
    .avatar-wrap {
      position: relative; flex-shrink: 0;
    }
    .avatar-ring {
      padding: 2px; border-radius: 50%;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
    }
    .avatar-ring img, .avatar-placeholder {
      width: 48px; height: 48px; border-radius: 50%;
      display: block; object-fit: cover;
    }
    .avatar-placeholder {
      background: #1e1e2e;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    /* Plan icon badge — bottom-right of avatar */
    .plan-icon-badge {
      position: absolute; bottom: -2px; right: -2px;
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; line-height: 1;
      border: 2px solid #0d0d14;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .plan-icon-badge.free  { background: #27273a; }
    .plan-icon-badge.pro   { background: linear-gradient(135deg,#6366f1,#8b5cf6); }
    .plan-icon-badge.elite { background: linear-gradient(135deg,#f59e0b,#ef4444); }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-weight: 700; font-size: 14px; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-email {
      font-size: 11px; color: #52526e; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-plan-row { display: flex; align-items: center; gap: 6px; margin-top: 5px; }

    /* ── Usage bar ── */
    .usage-wrap { display: none; }
    .usage-label {
      font-size: 10px; color: #52526e; font-weight: 600;
      display: flex; justify-content: space-between; margin-bottom: 5px;
    }
    .usage-label span:last-child { color: #a1a1c0; }
    .usage-bar { height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
    .usage-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg,#6366f1,#8b5cf6);
      transition: width 0.4s ease;
    }
    .usage-fill.warn { background: linear-gradient(90deg,#f59e0b,#ef4444); }

    .limit-warn {
      margin-top: 10px;
      background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.18);
      border-radius: 8px; padding: 7px 10px; font-size: 11px; color: #fbbf24;
      line-height: 1.4; display: none;
    }

    /* ── Action buttons ── */
    .action-row {
      display: flex; gap: 8px; padding: 12px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .btn {
      flex: 1; padding: 8px 12px; border: none; border-radius: 9px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.18s; display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }
    .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-ghost { background: rgba(255,255,255,0.05); color: #a1a1c0; border: 1px solid rgba(255,255,255,0.08); }
    .btn-ghost:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .btn-danger { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.18); }
    .btn-danger:hover { background: rgba(239,68,68,0.18); }

    /* ── Login section ── */
    #loginSection {
      padding: 22px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: none;
    }
    .login-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .login-sub { font-size: 11px; color: #52526e; margin-bottom: 14px; line-height: 1.4; }
    .btn-google {
      width: 100%; padding: 10px 14px; border: none; border-radius: 10px;
      background: #fff; color: #1f2937; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 9px; transition: background 0.18s; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .btn-google:hover { background: #f3f4f6; }
    .btn-google:disabled { opacity: 0.6; cursor: not-allowed; }
    .google-icon { width: 17px; height: 17px; flex-shrink: 0; }

    /* ── Config section ── */
    .config-header {
      padding: 8px 18px 6px;
      font-size: 9px; font-weight: 700; color: #3a3a55;
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .config-section { padding: 0 18px 14px; }
    .field { margin-bottom: 9px; }
    label { display: block; font-size: 10px; font-weight: 600; color: #52526e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    input {
      width: 100%; padding: 8px 10px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: #e4e4f0; font-size: 12px; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: rgba(99,102,241,0.6); background: rgba(255,255,255,0.06); }
    input::placeholder { color: #2e2e45; }
    .btn-save {
      width: 100%; padding: 9px; border: none; border-radius: 9px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 2px;
      transition: opacity 0.18s;
    }
    .btn-save:hover { opacity: 0.88; }

    .status {
      font-size: 11px; font-weight: 600; text-align: center; padding: 6px 10px;
      border-radius: 7px; margin-top: 7px; display: none;
    }
    .status.success { background: rgba(16,185,129,0.1); color: #34d399; display: block; }
    .status.error { background: rgba(239,68,68,0.1); color: #f87171; display: block; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-text">SignalFlow</div>
        <div class="logo-sub">LinkedIn Lead Capture</div>
      </div>
    </div>
    <span class="plan-badge" id="headerPlanBadge" style="display:none"></span>
  </div>

  <!-- Logged-in: Profile card -->
  <div id="profileSection">
    <div class="avatar-row">
      <div class="avatar-wrap">
        <div class="avatar-ring" id="avatarRing">
          <div class="avatar-placeholder">👤</div>
        </div>
        <div class="plan-icon-badge free" id="planIconBadge">🔘</div>
      </div>
      <div class="user-info">
        <div class="user-name" id="userName">—</div>
        <div class="user-email" id="userEmail"></div>
      </div>
    </div>

    <!-- Usage bar (free plan only) -->
    <div class="usage-wrap" id="usageWrap">
      <div class="usage-label">
        <span>Monthly saves</span>
        <span id="usageText"></span>
      </div>
      <div class="usage-bar">
        <div class="usage-fill" id="usageFill" style="width:0%"></div>
      </div>
      <div class="limit-warn" id="limitWarn">
        ⚠️ Monthly limit reached — <strong>upgrade to Pro</strong> for unlimited saves.
      </div>
    </div>
  </div>

  <!-- Logged-in: action buttons -->
  <div class="action-row hidden" id="actionSection">
    <button class="btn btn-primary" id="btnDashboard">Dashboard ↗</button>
    <button class="btn btn-danger" id="btnLogout">Sign out</button>
  </div>

  <!-- Logged-out: login -->
  <div id="loginSection">
    <div class="login-title">Welcome to SignalFlow</div>
    <div class="login-sub">Sign in to track usage, manage leads, and upgrade your plan.</div>
    <button class="btn-google" id="btnGoogle">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <!-- Config: always visible -->
  <div class="config-header">Configuration</div>
  <div class="config-section">
    <div class="field">
      <label>API URL</label>
      <input type="url" id="apiUrl" placeholder="https://your-app.replit.app" />
    </div>
    <div class="field">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sf_..." />
    </div>
    <button class="btn-save" id="btnSave">Save Settings</button>
    <div class="status" id="statusMsg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
