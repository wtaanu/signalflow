<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalFlow Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      padding: 0;
    }

    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      font-size: 22px;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-top: 2px;
    }

    .content {
      padding: 18px 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      background: #1e1e2e;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #6366f1;
    }

    input::placeholder {
      color: #4a4a6a;
    }

    .btn-save {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    .btn-save:hover { opacity: 0.88; }

    .status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: #6ee7b7;
    }

    .status.error { color: #f87171; }

    .help {
      margin-top: 14px;
      padding: 10px 12px;
      background: #1a1a2a;
      border-radius: 8px;
      border: 1px solid #2d2d3d;
    }

    .help p {
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
    }

    .help strong { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">⚡</div>
    <div class="header-text">
      <h1>SignalFlow</h1>
      <p>LinkedIn Lead Capture</p>
    </div>
  </div>

  <div class="content">
    <div class="field">
      <label>Dashboard URL</label>
      <input type="url" id="apiUrl" placeholder="https://your-app.replit.app" />
    </div>

    <div class="field">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sf_..." />
    </div>

    <button class="btn-save" id="saveBtn">Save Settings</button>
    <div class="status" id="status"></div>

    <div class="help">
      <p>
        <strong>How to use:</strong> Open any LinkedIn profile and click the
        <strong>✨ Save Lead</strong> button that appears. Leads are instantly
        sent to your SignalFlow dashboard.
      </p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
